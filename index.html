<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Portian Apexium Report</title>
  <link rel="stylesheet" href="assets/style.css" id="style">
</head>

<body>
  <div id="loader">
    <img src="assets/intro.webp" id="loadimage" alt="Loading Image">
    <h1 class="text">Poros Enterpise</h1>
  </div>
  <div class="effect" style="z-index: 5;"></div>
</body>

</html>

<style>
  * {
    cursor: none;
  }

  body {
    margin: 0;
    padding: 0;
    background: black;
  }

  p {
    color: white;
    font-family: 'ra-inet';
    font-size: 1.5rem;
  }

  #loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3;
  }

  #loader img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* animation: rotate 60s linear infinite; */
  }

  .text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 7rem;
    font-family: 'ra-inet';
    z-index: 2;
    text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
  }

  @keyframes rotate {
    from {
      transform: rotate(0deg) scale(1);
    }

    to {
      transform: rotate(180deg) scale(5);
    }
  }

  @keyframes fade-in {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }
  
  @keyframes fade-out {
    from {
      opacity: 1;
    }

    to {
      opacity: 0;
    }
  }
</style>

<script>
  document.getElementById("loader").style.display = "none";

  function createEl(text) {
    if (text == "") {
      const br = document.createElement("br");
      br.className = "introtext";
      document.body.appendChild(br);
    }
    const p = document.createElement("p");
    p.innerText = text;
    p.className = "introtext";
    document.body.appendChild(p);
    return p;
  }

  async function beginIntro() {
    document.querySelectorAll('.introtext').forEach(element => {
      element.remove();
    });
    const p = createEl("Welcome, Officer.");
    await sleep(1000);

    document.getElementById("loader").style.display = "block";
    const img = document.querySelector('#loader img');
    img.style.animation = 'fade-in 4.5s linear, rotate 60s linear infinite'

    const text = document.querySelector('#loader h1');
    text.style.animation = 'fade-in 2.5s linear'

    await sleep(8000)
    document.querySelectorAll('.introtext').forEach(element => {
      element.remove();
    });
    text.style.animation = 'fade-out 2.5s linear'
    img.style.animation = 'fade-out 2.5s linear, rotate 60s linear infinite'

    await sleep(2000)
    text.style.display = "none";
    img.style.display = "none";
    window.location.href = "desktop.html"
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function start() {
    createEl("[BOOT SEQUENCE INITIATED]")
    await sleep(1500);
    createEl("")
    await sleep(500);
    createEl("Loading Ministry Kernel 4.12...")
    await sleep(500);
    createEl("Checking Surveillance Drivers...")
    await sleep(500);
    createEl("Mounting /data/citizens...")
    await sleep(500);
    createEl("Mounting /data/journalists...")
    await sleep(500);
    createEl("Mounting /data/dissidents...")
    await sleep(1500);
    createEl("")
    await sleep(500);
    createEl("Starting Bureaucratic Decision Engine...")
    await sleep(500);
    createEl("Loading Propaganda Filter...")
    await sleep(500);
    createEl("Calibrating Narrative Alignment...")
    await sleep(1500);
    createEl("")
    await sleep(500);
    createEl("Verifying Operator Identity...")
    await sleep(500);
    var log = createEl("Password: ");
    await sleep(1000);
    log.remove();
    var log = createEl("Password: *");
    await sleep(100);
    log.remove();
    var log = createEl("Password: **");
    await sleep(100);
    log.remove();
    var log = createEl("Password: ***");
    await sleep(100);
    log.remove();
    var log = createEl("Password: ****");
    await sleep(100);
    log.remove();
    var log = createEl("Password: *****");
    await sleep(100);
    log.remove();
    var log = createEl("Password: ******");
    await sleep(100);
    log.remove();
    var log = createEl("Password: *******");
    await sleep(500);
    createEl("[IDENTITY CONFIRMED]")
    await sleep(500);
    createEl("Operator Clearance: LEVEL 3")
    await sleep(500);
    createEl("Monitoring Enabled.")
    await sleep(1000);
    createEl("")
    await sleep(500);
    createEl("Welcome, Officer.")
    await sleep(1000);
    beginIntro();
  }

  start();
</script>
